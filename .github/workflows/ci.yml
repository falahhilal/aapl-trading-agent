# .github/workflows/ci.yml
# CI/CD Pipeline 

name: CI/CD — Build, Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aapl-trading-agent .

      - name: Start container
        run: |
          docker run -d \
            --name aapl-agent \
            -p 8000:8000 \
            aapl-trading-agent
          echo "Container started"

      - name: Wait for API to start
        run: |
          echo "Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/ > /dev/null; then
              echo "API is up"
              break
            fi
            echo "Attempt $i — not ready yet, waiting 2s..."
            sleep 2
          done

      - name: Test root endpoint
        run: |
          response=$(curl -s http://localhost:8000/)
          echo "Response: $response"
          echo $response | grep -q "running" && echo "PASS" || (echo "FAIL" && exit 1)

      - name: Test predict endpoint
        run: |
          response=$(curl -s http://localhost:8000/predict/2024-01-05)
          echo "Response: $response"
          echo $response | grep -q "action" && echo "PASS" || (echo "FAIL" && exit 1)

      - name: Test backtest endpoint
        run: |
          response=$(curl -s http://localhost:8000/backtest)
          echo "Response: $response"
          echo $response | grep -q "total_return" && echo "PASS" || (echo "FAIL" && exit 1)

      - name: Test trades endpoint
        run: |
          response=$(curl -s http://localhost:8000/trades)
          echo "Response: $response"
          echo $response | grep -q "entry_date" && echo "PASS" || (echo "FAIL" && exit 1)

      - name: Print container logs
        if: failure()
        run: docker logs aapl-agent

      - name: Stop container
        if: always()
        run: docker stop aapl-agent

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"